name: CrystalBoy
options:
  bundleIdPrefix: com.crystalboy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  CrystalBoy:
    type: application
    platform: macOS
    sources:
      - path: CrystalBoy
        excludes:
          - "**/.DS_Store"
      - path: Bridge
        type: group
        compilerFlags:
          - "-I$(SRCROOT)/SameBoyCore/include"
          - "-I$(SRCROOT)/MGBACore/include"
          - "-I$(SRCROOT)/NestopiaCore/include"
          - "-I$(SRCROOT)/NestopiaCore"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crystalboy.app
        PRODUCT_NAME: CrystalBoy
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_OBJC_BRIDGING_HEADER: CrystalBoy/CrystalBoy-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/SameBoyCore/include"
          - "$(SRCROOT)/MGBACore/include"
          - "$(SRCROOT)/NestopiaCore/include"
          - "$(SRCROOT)/NestopiaCore"
          - "$(SRCROOT)/Bridge"
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/SameBoyCore"
          - "$(SRCROOT)/MGBACore"
          - "$(SRCROOT)/NestopiaCore"
        OTHER_LDFLAGS:
          - "-lsameboy"
          - "-lmgba"
          - "-lnestopia"
          - "-lm"
          - "-lc++"
        SWIFT_STRICT_CONCURRENCY: targeted
        ENABLE_USER_SCRIPT_SANDBOXING: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
        GENERATE_INFOPLIST_FILE: true
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_ENTITLEMENTS: CrystalBoy/CrystalBoy.entitlements
